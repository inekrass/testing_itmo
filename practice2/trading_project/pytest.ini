[pytest]
addopts = -v --tb=short --strict-markers
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    smoke: быстрые критичные проверки
    boundary: граничные значения
    negative: негативные сценарии
    slow: медленные тесты
    integration: требуют внешних зависимостей
