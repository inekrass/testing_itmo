[pytest]
# Дефолтные опции при каждом запуске
addopts = -v --tb=short --strict-markers

# Где искать тесты
testpaths = tests

# Паттерны
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Зарегистрированные маркеры
markers =
    smoke: быстрые критичные проверки (< 1 сек)
    boundary: тесты граничных значений
    negative: негативные сценарии (ошибки, исключения)
    slow: медленные тесты (> 1 сек)
    integration: требуют внешних зависимостей
